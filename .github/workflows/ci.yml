name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install build tools
        run: sudo apt-get install -y ninja-build

      # Derive MLIR_DIR using the ktir-mlir-frontend commit pinned in pyproject.toml,
      # so setup_mlir.py and llvm-hash.txt come from the same ref uv.lock installs —
      # the source + LLVM pair that upstream CI actually validated together.
      # We pass --wheel to use the mlir_wheel fallback (artifact path requires a GitHub
      # token not available in public CI).
      # Drop-in removal: once ktir-mlir-frontend publishes a wheel to PyPI, delete
      # this step entirely — `uv sync --extra mlir-frontend` will install it directly.
      - name: Set up MLIR
        run: |
          REF=$(grep -oE 'ktir-mlir-frontend@[^"]+' pyproject.toml | cut -d@ -f2)
          [ -n "$REF" ] || { echo "could not extract ktir-mlir-frontend ref from pyproject.toml" >&2; exit 1; }
          BASE="https://raw.githubusercontent.com/torch-spyre/ktir-mlir-frontend/$REF"
          LLVM_HASH=$(curl -fsSL "$BASE/cmake/llvm-hash.txt")
          MLIR_DIR=$(curl -fsSL "$BASE/scripts/setup_mlir.py" | uv run python - --wheel --hash "$LLVM_HASH")
          uv pip install scikit-build-core "nanobind>=2.12.0"
          echo "CMAKE_ARGS=-DMLIR_DIR=$MLIR_DIR" >> $GITHUB_ENV

      - name: Install project and dependencies
        run: uv sync --extra dev --extra mlir-frontend --no-build-isolation

      - name: Run basic tests (with regex parser)
        run: uv run pytest -v --ignore=tests/mlir_frontend

      - name: Run MLIR frontend parser tests
        run: uv run pytest tests/mlir_frontend/ -v
